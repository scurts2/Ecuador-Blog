<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Abroad Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <p class="header-eyebrow">Personal archive</p>
    <h1>Study Abroad<br><em>Journal</em></h1>
    <p class="header-desc">Ten days of daily reflections from a study abroad trip to Ecuador — the people, the land, and everything brought home.</p>
    <div class="header-meta">
      <span class="header-pill">9 days</span>
      <span class="header-pill">Ecuador</span>
      <span class="header-pill">Study abroad</span>
    </div>
  </header>

  <nav class="filter-bar">
    <button class="filter-btn active" data-filter="all">All days</button>
    <button class="filter-btn" data-filter="culture">Culture</button>
    <button class="filter-btn" data-filter="science">Science</button>
    <button class="filter-btn" data-filter="reflections">Reflections</button>
    <button class="filter-btn" data-filter="food">Food</button>
  </nav>

  <main class="grid-container">
    <div class="days-grid" id="grid"></div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal-inner">
      <button class="close-btn" onclick="closeModal()">&#x2715;</button>
      <div class="modal-photo" id="modal-photo">
        <div class="photo-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:32px;height:32px;color:var(--accent)"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M9 5l1-2h4l1 2"/></svg>
          <span style="font-size:12px;color:var(--accent)">Add your photo here</span>
        </div>
      </div>
      <div class="modal-content">
        <div class="modal-eyebrow" id="modal-eyebrow"></div>
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-location" id="modal-location"></p>
        <div class="modal-divider"></div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-tags" id="modal-tags"></div>
        <div class="modal-gallery" id="modal-gallery"></div>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox" onclick="handleLightboxClick(event)">
    <button class="lightbox-close" onclick="closeLightbox(event)">&#x2715;</button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" onclick="lightboxPrev(event)">&#8249;</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" />
    <button class="lightbox-nav lightbox-next" id="lightbox-next" onclick="lightboxNext(event)">&#8250;</button>
  </div>

  <footer>
    Study Abroad Journal &nbsp;&middot;&nbsp; Personal Archive
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
